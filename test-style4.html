<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Style 4 测试</title>
<link rel="stylesheet" href="/tmp/iori-nav/public/css/style.css">
<style>
body { padding: 40px; background: #0a0a1a; font-family: sans-serif; }
h2 { color: #fff; margin: 20px 0 10px; }
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 12px; max-width: 800px; }
</style>
</head>
<body>
<h2>Style 4 - GoTab 毛玻璃卡片</h2>
<div class="grid">
  <article class="site-card style-4 group h-full flex flex-col overflow-hidden transition-all">
    <div class="site-card-content">
      <a href="#" target="_blank" class="block">
        <div class="flex items-start">
          <div class="site-icon flex-shrink-0 mr-4 transition-all duration-300">
            <img src="https://faviconsnap.com/api/favicon?url=https://github.com&size=32" width="46" height="46" class="rounded-lg object-cover" loading="lazy">
          </div>
          <div class="flex-1 min-w-0">
            <h3 class="site-title">GitHub</h3>
          </div>
        </div>
      </a>
    </div>
  </article>

  <article class="site-card style-4 group h-full flex flex-col overflow-hidden transition-all">
    <div class="site-card-content">
      <a href="#" target="_blank" class="block">
        <div class="flex items-start">
          <div class="site-icon flex-shrink-0 mr-4 transition-all duration-300">
            <img src="https://faviconsnap.com/api/favicon?url=https://google.com&size=32" width="46" height="46" class="rounded-lg object-cover" loading="lazy">
          </div>
          <div class="flex-1 min-w-0">
            <h3 class="site-title">Google</h3>
          </div>
        </div>
      </a>
    </div>
  </article>

  <article class="site-card style-4 group h-full flex flex-col overflow-hidden transition-all">
    <div class="site-card-content">
      <a href="#" target="_blank" class="block">
        <div class="flex items-start">
          <div class="site-icon flex-shrink-0 mr-4 transition-all duration-300">
            <img src="https://faviconsnap.com/api/favicon?url=https://bing.com&size=32" width="46" height="46" class="rounded-lg object-cover" loading="lazy">
          </div>
          <div class="flex-1 min-w-0">
            <h3 class="site-title">Bing</h3>
          </div>
        </div>
      </a>
    </div>
  </article>

  <article class="site-card style-4 group h-full flex flex-col overflow-hidden transition-all">
    <div class="site-card-content">
      <a href="#" target="_blank" class="block">
        <div class="flex items-start">
          <div class="site-icon flex-shrink-0 mr-4 transition-all duration-300">
            <div class="w-10 h-10 rounded-lg bg-primary-600 flex items-center justify-center text-white font-semibold text-lg shadow-inner">V</div>
          </div>
          <div class="flex-1 min-w-0">
            <h3 class="site-title">Vercel 部署平台</h3>
          </div>
        </div>
      </a>
    </div>
  </article>
</div>

<h2 style="margin-top:40px">对比 - Style 1 (默认)</h2>
<div class="grid">
  <article class="site-card group h-full flex flex-col bg-white border border-primary-100/60 shadow-sm overflow-hidden">
    <div class="site-card-content">
      <a href="#" class="block">
        <div class="flex items-start">
          <div class="site-icon flex-shrink-0 mr-4 transition-all duration-300">
            <img src="https://faviconsnap.com/api/favicon?url=https://github.com&size=32" width="40" height="40" class="rounded-lg object-cover bg-gray-100" loading="lazy">
          </div>
          <div class="flex-1 min-w-0">
            <h3 class="site-title text-base font-medium text-gray-900 truncate">GitHub</h3>

          </div>
        </div>
